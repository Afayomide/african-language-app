        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            box-shadow: 0px 8px 24px rgba(57, 56, 47, 0.08);

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 bg-[#fffcfb] dark:bg-[#1a1108]">
<div class="flex items-center gap-4 w-full">
<button class="hover:bg-[#f0e6dd] transition-colors p-2 rounded-full flex items-center justify-center text-[#af4b06]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Progress Bar Integration -->
<div class="flex-grow h-3 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute inset-y-0 left-0 bg-primary rounded-full" style="width: 65%;"></div>
<div class="absolute inset-0 shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)] rounded-full"></div>
</div>
<div class="flex items-center gap-1 text-primary font-bold px-3 py-1 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-sm" data-icon="local_fire_department" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-xs font-label uppercase tracking-widest">12</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12 max-w-2xl mx-auto w-full">
<!-- Instructional Header -->
<div class="text-center mb-10">
<span class="text-on-surface-variant font-label text-xs font-bold tracking-[0.15em] uppercase mb-2 block">Speaking Exercise</span>
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight leading-tight">
                Repeat the phrase
            </h1>
</div>
<!-- The Word Card (Editorial Layout) -->
<div class="w-full relative mb-12">
<!-- Background Layering -->
<div class="absolute -inset-2 bg-surface-container-low rounded-[2rem] -rotate-1"></div>
<div class="relative bg-surface-container-lowest p-10 rounded-[2rem] mic-shadow flex flex-col items-center text-center border-b-4 border-surface-container-high">
<div class="mb-4 inline-flex items-center justify-center p-3 bg-secondary-container text-on-secondary-container rounded-xl cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="volume_up">volume_up</span>
</div>
<h2 class="font-headline text-5xl font-extrabold text-primary mb-2 tracking-tight">Káàárọ̀</h2>
<p class="text-on-surface-variant italic font-body text-lg">"Good morning"</p>
<!-- Visual Pronunciation Guide -->
<div class="mt-8 flex gap-2">
<span class="px-3 py-1 bg-surface-container text-on-surface-variant rounded-full text-sm font-label">Ká-àá-rọ̀</span>
</div>
</div>
</div>
<!-- Visual Audio Feedback (Glassmorphism Concept) -->
<div class="w-full max-w-xs h-16 flex items-center justify-center gap-1 mb-12">
<!-- Static wave representation -->
<div class="w-1.5 h-4 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-8 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-12 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-10 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-14 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-6 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-10 bg-outline-variant rounded-full opacity-30"></div>
<div class="w-1.5 h-4 bg-outline-variant rounded-full opacity-30"></div>
</div>
<!-- Microphone Interaction Area -->
<div class="mt-auto flex flex-col items-center gap-6">
<button class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-on-primary mic-shadow active:translate-y-[4px] transition-all duration-150 group">
<span class="material-symbols-outlined text-4xl group-active:scale-110 transition-transform" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<p class="font-label text-sm font-bold text-on-surface-variant uppercase tracking-widest">Tap to speak</p>
</div>
</main>
<!-- Contextual Context Image (Subtle Editorial Detail) -->
<div class="fixed bottom-0 right-0 w-32 h-32 opacity-20 pointer-events-none grayscale contrast-125 overflow-hidden rounded-tl-[3rem]">
<img alt="African textile texture" class="object-cover w-full h-full" data-alt="close-up of traditional woven Yoruba Aso-Oke fabric with intricate orange and brown geometric patterns and rich texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDU3gkulIslClC7b4E2Y31v9rGBP6UtibBgNw-z2gB6ENWuxfYwZ5o1DeJOkaQqT74JW8bBO8_gXFfBcvjiUwlFqH8gDVlDPUCe2V8t8V6RrlFBjLqf-5vOO5Tcc_NHjS1wT41aC8XJYXQZFfmsRHj5nZjOYaioAHOZth-nXRNiWWzYctkibB6d_cMOzPHGPfS-fKKuDStFIyQmi63kWJDtebXorPLWVnFaL5nEHdkAxYLEGvU9rhdAgoq0mzRNMX36jsJRAvsHgYIh"/>
</div>
<!-- Footer Action (Hidden or for focused flow) -->
<footer class="p-6 bg-surface flex justify-center">
<button class="w-full max-w-md py-4 rounded-xl font-headline font-bold text-primary bg-surface-container-highest hover:bg-surface-container-high transition-colors active:translate-y-[2px]">
            Can't talk right now
        </button>
</footer>
</body></html>
