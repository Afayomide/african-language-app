<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-4 glass-nav">
<div class="flex items-center gap-4 w-full max-w-4xl mx-auto">
<button class="p-2 rounded-full hover:bg-surface-container-high transition-colors active:translate-y-[2px] transition-transform duration-150">
<span class="material-symbols-outlined text-primary">close</span>
</button>
<div class="flex-grow h-3 bg-surface-container-highest rounded-full overflow-hidden inset-track mx-2">

</div>
<div class="flex items-center gap-1 bg-surface-container-low px-3 py-1 rounded-full border border-outline-variant/15">

</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center p-6 mt-16 max-w-4xl mx-auto w-full">

<div class="text-center mb-10">
<span class="font-label text-xs tracking-[0.05em] uppercase text-on-surface-variant font-bold mb-2 block">Word Focus</span>
<h1 class="font-headline text-3xl text-on-surface font-extrabold tracking-tight">Match the expressions</h1>
<p class="text-on-surface-variant text-sm mt-2">Connect the Yoruba terms with their English meanings</p>
</div>
<!-- Matching Grid: Bento Style -->
<div class="grid grid-cols-2 gap-4 w-full">
<!-- Left Column: Yoruba -->
<div class="space-y-3">
<button class="w-full text-left p-6 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-all active:translate-y-[2px] duration-150">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 font-bold">Term</p>
<h3 class="font-headline text-xl text-primary font-bold">Ẹ kú àárọ̀</h3>
</button>
<button class="w-full text-left p-6 bg-surface-container-lowest rounded-xl border border-primary/30 active-chip transition-all active:translate-y-[2px] duration-150">
<p class="font-label text-[10px] uppercase tracking-widest text-primary mb-1 font-bold">Selected</p>
<h3 class="font-headline text-xl text-primary font-bold">O dábọ̀</h3>
</button>
<button class="w-full text-left p-6 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-all active:translate-y-[2px] duration-150">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 font-bold">Term</p>
<h3 class="font-headline text-xl text-primary font-bold">Ẹ ṣé</h3>
</button>
<button class="w-full text-left p-6 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-all active:translate-y-[2px] duration-150 opacity-40 grayscale">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 font-bold">Matched</p>
<h3 class="font-headline text-xl text-primary font-bold line-through">Báwo ni?</h3>
</button>
</div>
<!-- Right Column: English -->
<div class="space-y-3">
<button class="w-full text-left p-6 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-all active:translate-y-[2px] duration-150">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 font-bold">Translation</p>
<h3 class="font-headline text-xl text-on-surface font-bold">Good morning</h3>
</button>
<button class="w-full text-left p-6 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-all active:translate-y-[2px] duration-150">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 font-bold">Translation</p>
<h3 class="font-headline text-xl text-on-surface font-bold">Thank you</h3>
</button>
<button class="w-full text-left p-6 bg-surface-container-low rounded-xl border border-outline-variant/15 hover:bg-surface-container-high transition-all active:translate-y-[2px] duration-150">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-1 font-bold">Translation</p>

</button>

</div>
