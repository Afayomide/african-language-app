<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
      }
      .glass-effect {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }
      .lesson-grid {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100vh;
        max-height: 100vh;
        overflow: hidden;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface lesson-grid">
<!-- Top Navigation Shell (Fixed Implementation from JSON) -->
<nav class="bg-orange-50/80 dark:bg-stone-900/80 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full h-16 fixed top-0 z-50 no-border bg-opacity-90 shadow-none">
<div class="flex items-center gap-4">
<button class="text-orange-800 dark:text-orange-200 hover:bg-orange-100/50 dark:hover:bg-stone-800/50 transition-colors p-2 rounded-full active:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<!-- Progress Bar Integrated into Header for Scroll-free UX -->
<div class="w-48 md:w-64 h-3 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute inset-y-0 left-0 bg-gradient-to-r from-primary to-primary-container w-[65%] rounded-full shadow-sm"></div>
</div>
</div>
<div class="text-orange-900 dark:text-orange-100 font-extrabold tracking-tighter font-headline text-lg">
            Yoruba
        </div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-headline font-bold text-on-surface">12</span>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-6 flex flex-col max-w-2xl mx-auto w-full">
<!-- Question Section -->
<header class="mb-10 animate-fade-in">
<div class="flex items-center gap-4 mb-2">
<span class="font-label text-xs font-bold uppercase tracking-widest text-primary">Translation Task</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<div class="flex items-start gap-4">
<button class="bg-primary-container text-on-primary-container p-4 rounded-2xl shadow-sm hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="volume_up">volume_up</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline text-2xl md:text-3xl font-bold text-on-surface leading-tight">
                        What is <span class="text-primary border-b-2 border-dashed border-primary-container">Káàárọ</span> in English?
                    </h1>
</div>
</div>
</header>
<!-- Options Bento Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-grow">
<!-- Option 1 -->
<button class="group relative flex items-center p-5 bg-surface-container-low rounded-3xl transition-all duration-300 hover:bg-surface-container-high hover:-translate-y-1 active:scale-95 text-left overflow-hidden">
<div class="flex flex-col gap-1 z-10">
<span class="font-label text-[10px] font-black text-outline uppercase tracking-tighter mb-1">Option 1</span>
<p class="font-headline text-lg font-bold text-on-surface leading-snug">Good morning</p>
<p class="font-body text-sm text-on-surface-variant italic">(respectful, ma)</p>
</div>
<div class="absolute right-[-10%] bottom-[-20%] opacity-5 text-on-surface group-hover:opacity-10 transition-opacity">
<span class="material-symbols-outlined text-8xl" data-icon="account_circle">account_circle</span>
</div>
</button>
<!-- Option 2 (Selected State Mockup) -->
<button class="group relative flex items-center p-5 bg-secondary-container ring-2 ring-primary rounded-3xl transition-all duration-300 shadow-[0_8px_24px_rgba(169,70,0,0.1)] -translate-y-1 text-left overflow-hidden">
<div class="flex flex-col gap-1 z-10">
<span class="font-label text-[10px] font-black text-primary uppercase tracking-tighter mb-1">Option 2</span>
<p class="font-headline text-lg font-bold text-on-primary-container leading-snug">Good morning</p>
<p class="font-body text-sm text-on-primary-container/70 italic">(casual, sir)</p>
</div>
<div class="absolute right-4 top-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="group relative flex items-center p-5 bg-surface-container-low rounded-3xl transition-all duration-300 hover:bg-surface-container-high hover:-translate-y-1 active:scale-95 text-left overflow-hidden">
<div class="flex flex-col gap-1 z-10">
<span class="font-label text-[10px] font-black text-outline uppercase tracking-tighter mb-1">Option 3</span>
<p class="font-headline text-lg font-bold text-on-surface leading-snug">Good afternoon</p>
<p class="font-body text-sm text-on-surface-variant italic">(formal)</p>
</div>
</button>
<!-- Option 4 -->
<button class="group relative flex items-center p-5 bg-surface-container-low rounded-3xl transition-all duration-300 hover:bg-surface-container-high hover:-translate-y-1 active:scale-95 text-left overflow-hidden">
<div class="flex flex-col gap-1 z-10">
<span class="font-label text-[10px] font-black text-outline uppercase tracking-tighter mb-1">Option 4</span>
<p class="font-headline text-lg font-bold text-on-surface leading-snug">Hello, how are you?</p>
</div>
</button>
</section>
</main>
<!-- Bottom Action Shell (Fixed Implementation from JSON/Design System) -->
<div class="fixed bottom-0 left-0 w-full bg-orange-50/90 dark:bg-stone-950/90 backdrop-blur-2xl px-6 pb-10 pt-6 z-50 shadow-[0_-8px_24px_rgba(175,75,6,0.06)] rounded-t-3xl">
<div class="max-w-2xl mx-auto flex flex-col gap-4">
<!-- Hint Section (Optional system feel) -->
<div class="flex items-center gap-3 px-4 py-2 bg-surface-container rounded-xl">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="lightbulb">lightbulb</span>
<p class="text-xs font-medium text-on-surface-variant leading-tight">Hint: Yoruba greetings often change based on the time of day and seniority.</p>
</div>
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-2xl font-headline font-extrabold text-lg tracking-wide shadow-lg hover:shadow-primary/20 active:translate-y-0.5 transition-all duration-300 uppercase">
                Check Answer
            </button>
</div>
</div>

<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[5%] -right-[5%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>

<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#a94600 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
